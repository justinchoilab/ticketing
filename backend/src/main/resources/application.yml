spring:
  datasource:
    url: jdbc:h2:mem:ticketingdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
    open-in-view: false
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: 6379

server:
  port: 8080

logging:
  level:
    org.springframework.web.socket.config.annotation.WebSocketMessageBrokerStats: WARN
