services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped

  backend:
    build: ./backend
    environment:
      - TZ=Asia/Seoul
      - REDIS_HOST=redis
    depends_on:
      - redis
    restart: unless-stopped

  frontend:
    build: ./frontend
    environment:
      - TZ=Asia/Seoul
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
